name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: fleet-logger-api
  DB_NAME: test_db
  DB_USER: test_user
  DB_PASSWORD: test_password
  DB_HOST: localhost
  DB_PORT: 5432
  SECRET_KEY: p)lc1=1&8cq%9vz-sa4#*^57iq2s(m%)xwmsyq1v077c#+b=2^
  CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
  CSRF_TRUSTED_ORIGINS: http://localhost

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run migrations and tests
        run: |
          python manage.py migrate
          coverage run --source='.' manage.py test
          coverage report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  build-and-package:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Django Image
        run: docker compose -f docker-compose-deploy.yml build web

      - name: Save Image to File
        run: docker save vehicle_fleet_web:latest > web_image.tar

      - name: Upload Image and Config as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle
          #we bundle the things together and ship it to OCI instance
          path: |
            web_image.tar
            docker-compose-deploy.yml
            nginx/nginx.conf
            gunicorn_config.py
          retention-days: 1


  deploy:
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Download Bundle
        uses: actions/download-artifact@v4
        with:
          name: deployment-bundle

      - name: Prepare Server Directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_INSTANCE_IP }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: mkdir -p ~/app/nginx

      - name: Transfer to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.OCI_INSTANCE_IP }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "web_image.tar,docker-compose-deploy.yml,nginx/nginx.conf,gunicorn_config.py"
          target: "~/app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_INSTANCE_IP }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ~/app
            # 1 load image to docker
            docker load < web_image.tar
            # 2 use --remove-orphans to keep the 1gb ram server clean
            docker compose -f docker-compose-deploy.yml up -d --remove-orphans
            # 3 Run migrations (separate command to monitor for RAM spikes)
            docker compose -f docker-compose-deploy.yml exec -T web python manage.py migrate --noinput
            # 4 free up space by removing the old images
            docker image prune -f
