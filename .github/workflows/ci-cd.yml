name: CI/CD Pipeline

on:
  push:
    branches: [ "main"]
    paths-ignore:
      - 'new_frontend/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'new_frontend/**'
env:
  DOCKER_IMAGE: fleet-logger-api
  DB_NAME: test_db
  DB_USER: test_user
  DB_PASSWORD: test_password
  DB_HOST: localhost
  DB_PORT: 5432
  SECRET_KEY: ${{ secrets.ACTIONS_TEST_SECRET_KEY }}
  CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
  CSRF_TRUSTED_ORIGINS: http://localhost

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run migrations and tests
        run: |
          python manage.py migrate
          coverage run --source='.' manage.py test
          coverage report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Replaces oracle-actions/setup-oci-cli
      - name: Install and Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.IAM_USER_API_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat <<EOF > ~/.oci/config
          [DEFAULT]
          user=${{ secrets.IAM_USER_OCID }}
          fingerprint=${{ secrets.IAM_USER_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/oci_api_key.pem
          EOF

          # Install CLI manually
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Login to OCIR
        run: |
          echo "${{ secrets.IAM_USER_AUTH_TOKEN }}" | docker login ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.IAM_USER_NAME }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE_PATH="ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com/${{ secrets.OCI_TENANCY_NAMESPACE }}/my-app-repo:latest"
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH

      - name: Deploy via Cloudflare Tunnel
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared access ssh-gen --hostname ssh.mohanish.online
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand='./cloudflared access ssh --hostname ssh.mohanish.online' \
              ubuntu@ssh.mohanish.online << 'EOF'
            cd /home/ubuntu/Fleet-Logger-App
            git pull origin main
            echo "${{ secrets.IAM_USER_AUTH_TOKEN }}" | docker login ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.IAM_USER_NAME }}" --password-stdin
            docker compose -f docker-compose-deploy.yml pull
            docker compose -f docker-compose-deploy.yml down
            docker compose -f docker-compose-deploy.yml up -d --remove-orphans
            docker compose -f docker-compose-deploy.yml exec -T web python manage.py migrate
            docker image prune -f
          EOF