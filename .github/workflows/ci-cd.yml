name: CI/CD Pipeline

on:
  push:
    branches: [ "main"]
    paths-ignore:
      - 'new_frontend/**'
      - 'README.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'new_frontend/**'
      - 'README.md'
env:
  DOCKER_IMAGE: fleet-logger-api
  DB_NAME: test_db
  DB_USER: test_user
  DB_PASSWORD: test_password
  DB_HOST: localhost
  DB_PORT: 5432
  SECRET_KEY: ${{ secrets.ACTIONS_TEST_SECRET_KEY }}
  CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
  CSRF_TRUSTED_ORIGINS: http://localhost

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run migrations and tests
        run: |
          python manage.py migrate
          coverage run --source='.' manage.py test
          coverage report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fleet-logger-app:latest

      #Create the directory first so SCP has a destination and not crash
      - name: Create deployment directory on OCI
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.OCI_INSTANCE_IP }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: mkdir -p /home/ubuntu/Fleet-Logger-App

      # push some files onto server that are needed
      - name: Push files to oci instance
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_INSTANCE_IP }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "nginx/*,docker-compose-deploy.yml,gunicorn_config.py"
          target: "/home/ubuntu/Fleet-Logger-App"

      # deploy via SSH, then running commands scritp
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_HUB_PAT }}
        with:
          host: ${{ secrets.OCI_INSTANCE_IP }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: DOCKER_USER,DOCKER_TOKEN
          script: |
            cd /home/ubuntu/Fleet-Logger-App
            echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USER" --password-stdin
            docker compose -f docker-compose-deploy.yml pull
            docker compose -f docker-compose-deploy.yml up -d --remove-orphans
            docker compose -f docker-compose-deploy.yml exec -T web python manage.py migrate
            docker image prune -af
