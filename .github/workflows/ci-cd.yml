name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/**" ]
    paths-ignore:
      - 'new_frontend/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'new_frontend/**'
env:
  DOCKER_IMAGE: fleet-logger-api
  DB_NAME: test_db
  DB_USER: test_user
  DB_PASSWORD: test_password
  DB_HOST: localhost
  DB_PORT: 5432
  SECRET_KEY: p)lc1=1&8cq%9vz-sa4#*^57iq2s(m%)xwmsyq1v077c#+b=2^
  CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
  CSRF_TRUSTED_ORIGINS: http://localhost

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run migrations and tests
        run: |
          python manage.py migrate
          coverage run --source='.' manage.py test
          coverage report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Replaces oracle-actions/setup-oci-cli
      - name: Install and Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_IAM_USER_API_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat <<EOF > ~/.oci/config
          [DEFAULT]
          user=${{ secrets.OCI_IAM_USER_OCID }}
          fingerprint=${{ secrets.OCI_IAM_USER_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/oci_api_key.pem
          EOF

          # Install CLI manually
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCI_IAM_USER_AUTH_TOKEN }}" | docker login ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/Default/${{ secrets.OCI_IAM_USER_NAME }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE_PATH="ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com/${{ secrets.OCI_TENANCY_NAMESPACE }}/my-app-repo:latest"
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH

      - name: Execute Remote Deployment
        run: |
          # 1. Read and encode repository files directly into local runner variables
          B64_NGINX=$(base64 -w 0 ./nginx/nginx.conf)
          B64_GUNI=$(base64 -w 0 ./gunicorn_config.py)
          B64_COMPOSE=$(base64 -w 0 ./docker-compose-deploy.yml)

          # 2. Define the exact script that will run natively on your server
          # We use a variable so we can safely inject it into the final JSON payload
          REMOTE_SCRIPT=$(cat << EOF
          #!/bin/bash
          set -e
          TARGET_DIR="/home/ubuntu/app"
          mkdir -p "\$TARGET_DIR/nginx"
          echo '$B64_NGINX' | base64 -d > "\$TARGET_DIR/nginx/nginx.conf"
          echo '$B64_GUNI' | base64 -d > "\$TARGET_DIR/gunicorn_config.py"
          echo '$B64_COMPOSE' | base64 -d > "\$TARGET_DIR/docker-compose-deploy.yml"
          sudo chown -R ubuntu:ubuntu "\$TARGET_DIR"
          cd "\$TARGET_DIR"
          export IMAGE_PATH="ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com/${{ secrets.OCI_TENANCY_NAMESPACE }}/my-app-repo:latest"
          echo "${{ secrets.OCI_IAM_USER_AUTH_TOKEN }}" | docker login ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/Default/${{ secrets.OCI_IAM_USER_NAME }}" --password-stdin
          docker compose -f docker-compose-deploy.yml pull && docker compose -f docker-compose-deploy.yml down && docker compose -f docker-compose-deploy.yml up -d --remove-orphans && docker compose -f docker-compose-deploy.yml exec -T web python manage.py migrate && docker image prune -f
          EOF
          )

          # Substitute placeholders with actual base64 values
          REMOTE_SCRIPT="${REMOTE_SCRIPT//PLACEHOLDER_NGINX/$B64_NGINX}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//PLACEHOLDER_GUNI/$B64_GUNI}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//PLACEHOLDER_COMPOSE/$B64_COMPOSE}"

          # Base64 encode script (safe for JSON)
          ENCODED_SCRIPT=$(echo "$REMOTE_SCRIPT" | base64 -w 0)

          # Create JSON payload properly
          echo "{\"actionType\": \"RUN_SCRIPT\", \"source\": {\"sourceType\": \"INLINE\", \"text\": \"$ENCODED_SCRIPT\"}}" > command_content.json
          # verify its not empty
          cat command_content.json

          # Trigger the OCI Run Command
          RESPONSE=$(/home/runner/bin/oci instance-agent command create \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --display-name "Deploy-${{ github.run_number }}" \
            --target "{\"instanceId\": \"${{ secrets.OCI_APP_INSTANCE_OCID }}\"}" \
            --content "file://command_content.json" \
            --timeout-in-seconds 600)

          # Extract the uniquely assigned Command ID from the response JSON
          COMMAND_ID=$(echo "$RESPONSE" | jq -r '.data.id')
          INSTANCE_ID="${{ secrets.OCI_APP_INSTANCE_OCID }}"
          echo "Deployment initiated. Command Tracking ID: $COMMAND_ID"

          # 6. Active Polling Loop (Watch status on the server)
          echo "Polling OCI Instance Agent for deployment results..."
          while true; do
            # Fetch the execution metadata for this specific instance
            EXEC_INFO=$(/home/runner/bin/oci instance-agent command-execution get \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID")

            # Extract the current lifecycle status state
            STATUS=$(echo "$EXEC_INFO" | jq -r '.data."lifecycle-state"')
            echo "Current Server Status: [ $STATUS ]"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "🎉 Success! Deployment files copied and Docker containers are up."
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "TIMED_OUT" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "❌ Deployment Failed with OCI Status: $STATUS"
              echo "====================== SERVER RUNTIME ERROR LOGS ======================"

              # Print out the exact stdout/stderr logs generated on your server
              echo "$EXEC_INFO" | jq -r '.data."execution-output"."output-content".text'
              echo "======================================================================="
              exit 1 # Forces the GitHub Action step to turn RED and fail
            fi

            # Sleep 10 seconds before checking the API again to avoid rate limits
            sleep 10
          done