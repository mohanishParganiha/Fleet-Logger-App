name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/**" ]
    paths-ignore:
      - 'new_frontend/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'new_frontend/**'
env:
  DOCKER_IMAGE: fleet-logger-api
  DB_NAME: test_db
  DB_USER: test_user
  DB_PASSWORD: test_password
  DB_HOST: localhost
  DB_PORT: 5432
  SECRET_KEY: p)lc1=1&8cq%9vz-sa4#*^57iq2s(m%)xwmsyq1v077c#+b=2^
  CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
  CSRF_TRUSTED_ORIGINS: http://localhost

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run migrations and tests
        run: |
          python manage.py migrate
          coverage run --source='.' manage.py test
          coverage report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Replaces oracle-actions/setup-oci-cli
      - name: Install and Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_IAM_USER_API_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat <<EOF > ~/.oci/config
          [DEFAULT]
          user=${{ secrets.OCI_IAM_USER_OCID }}
          fingerprint=${{ secrets.OCI_IAM_USER_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/oci_api_key.pem
          EOF

          # Install CLI manually
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCI_IAM_USER_AUTH_TOKEN }}" | docker login ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/Default/${{ secrets.OCI_IAM_USER_NAME }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE_PATH="ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com/${{ secrets.OCI_TENANCY_NAMESPACE }}/my-app-repo:latest"
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH

      - name: Execute Remote Deployment
        run: |
          # We use a heredoc to build the script.
          # Note: $(cat ...) runs on the GitHub Runner to inject file content.
          REMOTE_SCRIPT=$(cat <<EOF
          mkdir -p ~/app/nginx

          cat <<EOT > ~/app/nginx/nginx.conf
          $(cat /nginx/nginx.conf)
          EOT

          cat <<EOT > ~/app/docker-compose-deploy.yml
          $(cat docker-compose-deploy.yml)
          EOT

          cat <<EOT > ~/app/gunicorn_config.py
          $(cat gunicorn_config.py)
          EOT

          cd ~/app

          echo "${{ secrets.OCI_IAM_USER_AUTH_TOKEN }}" | docker login ocir.${{ secrets.OCI_REGION }}.oci.oraclecloud.com -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/Default/${{ secrets.OCI_IAM_USER_NAME }}" --password-stdin

          # Force pull the latest manifest from OCIR
          docker compose -f docker-compose-deploy.yml pull

          # Re-deploy
          docker compose -f docker-compose-deploy.yml up -d --remove-orphans

          # Clean up dangling images to save space on OCI boot volume
          docker image prune -f
          EOF
          )

          # Trigger the OCI Run Command
          /home/runner/bin/oci compute-instance-agent command create \
            --instance-id ${{ secrets.OCI_APP_INSTANCE_OCID }} \
            --display-name "Deploy-${{ github.run_number }}" \
            --content "{\"source\": {\"sourceType\": \"TEXT\", \"text\": \"$REMOTE_SCRIPT\"}}" \
            --wait-for-state SUCCEEDED
