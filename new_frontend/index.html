<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fleet Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h2>Fleet Manager</h2>

<nav id="navbar" class="nav hidden">
<button data-page="vehicles">Vehicles</button>
<button data-page="drivers">Drivers</button>
<button data-page="trips">Trips</button>
<button data-page="bulk">Bulk Calc</button>
<button id="logoutBtn">Logout</button>
</nav>
</header>

<main id="content"></main>

<!-- login -->

<div id="loginView" class="login">
<h3>Login</h3>

<form id="loginForm">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

<p id="loginError"></p>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
